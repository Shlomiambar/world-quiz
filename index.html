            const mainMenu = document.getElementById('main-menu');
            Object.keys(worldData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "px-4 py-2 rounded-xl font-bold bg-white text-blue-800 border-2 border-blue-100 shadow-sm transition-all hover:bg-blue-50";
                btn.textContent = cat;
                btn.onclick = () => handleMainMenuClick(cat);
                btn.id = `main-${cat}`;
                mainMenu.appendChild(btn);
            });
            document.getElementById('quiz-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
            updateHighScoreDisplay();
            handleMainMenuClick("אירופה");
        }

        function showCustomAlert(message, nextTask = null) {
            document.getElementById('custom-alert-message').textContent = message;
            document.getElementById('custom-alert-overlay').style.display = 'flex';
            window.pendingTask = nextTask;
        }

        function closeCustomAlert() {
            document.getElementById('custom-alert-overlay').style.display = 'none';
            if (window.pendingTask) {
                window.pendingTask();
                window.pendingTask = null;
            }
        }

        function startTimer() {
            stopTimer();
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const delta = Date.now() - startTime;
                const m = Math.floor(delta / 60000).toString().padStart(2, '0');
                const s = Math.floor((delta % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('quiz-timer').textContent = `${m}:${s}`;
            }, 1000);
        }

        function stopTimer() { if (timerInterval) clearInterval(timerInterval); }

        function getAllCountries() {
            let all = [];
            Object.values(worldData).forEach(cat => {
                if (cat.m) all = all.concat(cat.m);
                if (cat.sub) { Object.values(cat.sub).forEach(subList => all = all.concat(subList)); }
            });
            return all;
        }

        function handleAllWorldClick() {
            document.querySelectorAll('#main-menu button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('main-all').classList.add('active-btn');
            document.getElementById('sub-menu-container').classList.add('hidden');
            currentActiveList = getAllCountries();
            displayCountries(currentActiveList, "כל העולם");
        }

        function handleMainMenuClick(name) {
            document.querySelectorAll('#main-menu button').forEach(b => b.classList.remove('active-btn'));
            const targetBtn = document.getElementById(`main-${name}`);
            if(targetBtn) targetBtn.classList.add('active-btn');
            const data = worldData[name];
            const subContainer = document.getElementById('sub-menu-container');
            if (data.sub) {
                subContainer.classList.remove('hidden'); subContainer.innerHTML = '';
                Object.keys(data.sub).forEach(subName => {
                    const sBtn = document.createElement('button');
                    sBtn.className = "px-3 py-1 rounded-lg font-bold bg-white border-2 border-blue-100 text-xs transition-all sub-btn hover:bg-blue-50";
                    sBtn.textContent = subName;
                    sBtn.onclick = () => {
                        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active-btn'));
                        sBtn.classList.add('active-btn'); 
                        currentActiveList = data.sub[subName];
                        displayCountries(currentActiveList, subName);
                    };
                    subContainer.appendChild(sBtn);
                });
                subContainer.firstChild.click();
            } else {
                subContainer.classList.add('hidden'); currentActiveList = data.m;
                displayCountries(currentActiveList, name);
            }
        }

        function displayCountries(list, title) {
            document.getElementById('current-title').textContent = title;
            const grid = document.getElementById('countries-grid'); grid.innerHTML = '';
            const sorted = [...list].sort((a,b) => a.n.localeCompare(b.n, 'he'));
            sorted.forEach(item => {
                const card = document.createElement('div');
                card.className = "country-card p-4 rounded-2xl shadow-sm text-center font-bold text-gray-700";
                card.textContent = item.n;
                card.onclick = () => { showCountry(item); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                grid.appendChild(card);
            });
            document.getElementById('country-count').textContent = `${list.length} מדינות`;
        }

        function showCountry(item) {
            document.getElementById('display-country').textContent = item.n;
            document.getElementById('display-capital').textContent = item.c;
            const mC = document.getElementById('map-link-country');
            const mCap = document.getElementById('map-link-capital');
            mC.classList.remove('hidden'); mCap.classList.remove('hidden');
            mC.href = `https://www.google.com/maps/search/${encodeURIComponent(item.n)}`;
            mCap.href = `https://www.google.com/maps/search/${encodeURIComponent(item.c + ", " + item.n)}`;
        }

        function startSpecificQuiz(type) {
            currentQuizType = type; stats = { total: 0, success: 0, fail: 0 };
            updateScoreUI(); closeTypeOverlay(); generateQuestion(); startTimer();
            document.getElementById('quiz-overlay').style.display = 'flex';
        }

        function generateQuestion() {
            const random = currentActiveList[Math.floor(Math.random() * currentActiveList.length)];
            const qStr = currentQuizType === 'capital' ? `מה עיר הבירה של ${random.n}?` : `${random.c} היא הבירה של...`;
            document.getElementById('quiz-question').textContent = qStr;
            currentQuizAnswer = currentQuizType === 'capital' ? random.c : random.n;
            hintCount = 0; document.getElementById('quiz-input').value = ""; document.getElementById('quiz-input').focus();
        }

        function giveHint() {
            if (hintCount < currentQuizAnswer.length) {
                hintCount++; document.getElementById('quiz-input').value = currentQuizAnswer.substring(0, hintCount);
            }
        }

        function checkAnswer() {
            const input = document.getElementById('quiz-input').value.trim();
            if (input === "") return;
            if (input === currentQuizAnswer) {
                stats.total++;
                if (hintCount === currentQuizAnswer.length) {
                    stats.fail++; 
                    showCustomAlert("הפעם גילינו לכם... נסו לזכור זאת לפעם הבאה! 💪", () => { updateScoreUI(); generateQuestion(); });
                } else {
                    stats.success++; checkAndSaveHighScore(); playSuccessSound(); 
                    showCustomAlert("כל הכבוד לכם! תשובה נכונה מאוד! 🏆", () => { updateScoreUI(); generateQuestion(); });
                }
            } else { showCustomAlert("לא בדיוק, נסו שוב בבקשה!"); }
        }

        function openTypeOverlay() { document.getElementById('quiz-type-overlay').style.display = 'flex'; }
        function closeTypeOverlay() { document.getElementById('quiz-type-overlay').style.display = 'none'; }
        function closeQuiz() { stopTimer(); document.getElementById('quiz-overlay').style.display = 'none'; }
        function updateScoreUI() {
            document.getElementById('count-total').textContent = stats.total;
            document.getElementById('count-success').textContent = stats.success;
            document.getElementById('count-fail').textContent = stats.fail;
        }
        function updateHighScoreDisplay() { document.getElementById('high-score-display').textContent = localStorage.getItem('worldAppHighScore') || 0; }
        function checkAndSaveHighScore() {
            const current = parseInt(localStorage.getItem('worldAppHighScore') || 0);
            if (stats.success > current) { localStorage.setItem('worldAppHighScore', stats.success); updateHighScoreDisplay(); }
        }
        function resetHighScore() { if(confirm("לאפס שיא?")) { localStorage.setItem('worldAppHighScore', 0); updateHighScoreDisplay(); } }
        
        function playSuccessSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                osc.connect(g); g.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        init();
    </script>
</body>
</html>
