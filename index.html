<!DOCTYPE html>
<html lang="he" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>העולם שלנו - Our World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; transition: all 0.3s; }
        .country-card { transition: all 0.2s; cursor: pointer; border: 2px solid #e2e8f0; background: white; }
        .country-card:hover { transform: scale(1.02); border-color: #3b82f6; background-color: #eff6ff; }
        .active-btn { background-color: #1e40af !important; color: white !important; }
        .owner-banner { background: linear-gradient(90deg, #1e3a8a, #3b82f6); }
        #quiz-overlay, #quiz-type-overlay, #custom-alert-overlay { background: rgba(0,0,0,0.85); display: none; }
        .grid-container { max-height: 450px; overflow-y: auto; padding-right: 5px; }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="p-2 md:p-6 min-h-screen font-bold text-slate-800">

    <button onclick="toggleLanguage()" class="fixed top-4 left-4 z-[110] bg-white border-2 border-blue-600 text-blue-600 px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
        🌐 <span id="lang-toggle-text">English</span>
    </button>

    <div id="custom-alert-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center space-y-4 border-4 border-blue-600 animate-pop relative">
            <div class="absolute -top-12 left-1/2 -translate-x-1/2 bg-blue-600 w-24 h-24 rounded-full border-4 border-white shadow-xl flex items-center justify-center text-5xl">👨‍🏫</div>
            <div class="pt-8">
                <h3 id="alert-title" class="text-2xl font-black text-blue-900 mb-2"></h3>
                <div class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-100 italic text-blue-800 text-lg">
                    "<span id="custom-alert-message"></span>"
                </div>
            </div>
            <button onclick="closeCustomAlert()" id="alert-btn-text" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all"></button>
        </div>
    </div>

    <div id="quiz-type-overlay" class="fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl text-center space-y-6 border-4 border-blue-500">
            <h2 id="quiz-select-title" class="text-2xl font-bold text-blue-900"></h2>
            <div class="grid gap-4">
                <button onclick="startSpecificQuiz('capital')" id="btn-quiz-cap" class="bg-blue-600 text-white py-4 rounded-xl shadow-lg text-xl"></button>
                <button onclick="startSpecificQuiz('country')" id="btn-quiz-count" class="bg-amber-500 text-white py-4 rounded-xl shadow-lg text-xl"></button>
            </div>
            <button onclick="closeTypeOverlay()" id="btn-quiz-cancel" class="text-gray-500 text-lg font-black underline decoration-2 py-2 mt-4 hover:text-red-500 transition-colors"></button>
        </div>
    </div>

    <div id="quiz-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 max-w-md w-full shadow-2xl text-center space-y-4 border-4 border-blue-100">
            <div class="grid grid-cols-4 gap-1 mb-2">
                <div class="bg-blue-50 p-2 rounded-xl border-2"><div id="stat-total" class="text-[10px]"></div><div id="count-total" class="text-lg font-black">0</div></div>
                <div class="bg-green-50 p-2 rounded-xl border-2"><div id="stat-success" class="text-[10px]"></div><div id="count-success" class="text-lg font-black">0</div></div>
                <div class="bg-red-50 p-2 rounded-xl border-2"><div id="stat-fail" class="text-[10px]"></div><div id="count-fail" class="text-lg font-black">0</div></div>
                <div class="bg-slate-50 p-2 rounded-xl border-2"><div id="stat-time" class="text-[10px]"></div><div id="quiz-timer" class="text-lg font-black">00:00</div></div>
            </div>
            <div class="bg-amber-50 text-amber-700 py-1 px-4 rounded-full text-sm inline-block border border-amber-200">
                🏆 <span id="best-score-text"></span>: <span id="high-score-display">0</span>
            </div>
            <h2 id="quiz-question" class="text-2xl font-bold text-blue-900 min-h-[3rem]"></h2>
            <input type="text" id="quiz-input" class="w-full border-2 border-blue-200 rounded-xl p-4 text-center text-2xl outline-none shadow-inner">
            <div class="flex gap-2">
                <button onclick="checkAnswer()" id="btn-check" class="flex-1 bg-green-500 text-white py-4 rounded-xl shadow-lg"></button>
                <button onclick="giveHint()" id="btn-hint" class="flex-1 bg-amber-400 text-white py-4 rounded-xl shadow-lg"></button>
            </div>
            <div class="pt-4 mt-2 border-t border-gray-100">
                <button onclick="closeQuiz()" id="btn-end" class="text-gray-700 text-lg font-black underline decoration-2 hover:text-blue-700 transition-all py-2 w-full"></button>
                <button onclick="resetHighScore()" id="btn-reset-score" class="text-red-300 text-[10px] mt-2 block w-full hover:text-red-500"></button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto space-y-4">
        <div class="owner-banner p-6 rounded-3xl text-white shadow-xl text-center relative">
            <h1 id="header-main" class="text-3xl font-black mb-1"></h1>
            <h2 id="header-sub" class="text-xl opacity-90 mb-2"></h2>
            <div class="text-[10px] opacity-60 font-mono mt-2" id="version-tag"></div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-10 text-center border-b-4 border-gray-100">
            <div id="info-display">
                <h2 id="display-country" class="text-6xl font-black text-blue-900 mb-4"></h2>
                <p id="text-cap-label" class="text-gray-400 text-xl font-medium"></p>
                <p id="display-capital" class="text-5xl font-bold text-blue-600 mb-8 min-h-[3.5rem]"></p>
                <button onclick="openTypeOverlay()" id="btn-start-test" class="w-full max-w-md bg-green-500 text-white py-5 rounded-2xl shadow-lg text-2xl hover:bg-green-600 transition-all"></button>
            </div>
        </div>

        <div id="main-menu-container" class="flex flex-wrap justify-center gap-2">
            <button onclick="handleAllWorldClick()" id="btn-all-world" class="px-4 py-2 rounded-xl font-bold bg-amber-50 text-amber-800 border-2 border-amber-200 shadow-sm transition-all hover:bg-amber-100"></button>
            <div id="main-menu" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="bg-white rounded-2xl p-4 shadow-sm">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 id="current-title" class="text-xl font-bold text-gray-700"></h2>
                <span id="country-count" class="text-sm text-blue-600"></span>
            </div>
            <div id="countries-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2 grid-container"></div>
        </div>
    </div>

 ce: "Victoria"}, {n: "סנגל", ne: "Senegal", c: "דקאר", ce: "Dakar"}, {n: "צ'אד", ne: "Chad", c: "נג'מנה", ce: "N'Djamena"}, {n: "קמרון", ne: "Cameroon", c: "יאונדה", ce: "Yaounde"}, {n: "קניה", ne: "Kenya", c: "ניירובי", ce: "Nairobi"}, {n: "רואנדה", ne: "Rwanda", c: "קיגאלי", ce: "Kigali"}, {n: "תוניסיה", ne: "Tunisia", c: "תוניס", ce: "Tunis"}, {n: "אריתריאה", ne: "Eritrea", c: "אסמרה", ce: "Asmara"}, {n: "גמביה", ne: "Gambia", c: "בנג'ול", ce: "Banjul"}, {n: "גינאה ביסאו", ne: "Guinea-Bissau", c: "ביסאו", ce: "Bissau"}, {n: "גינאה המשוונית", ne: "Equatorial Guinea", c: "מלאבו", ce: "Malabo"}, {n: "קונגו (דמוקרטית)", ne: "DR Congo", c: "קינשאסה", ce: "Kinshasa"}, {n: "הרפובליקה המרכז אפריקאית", ne: "Central African Republic", c: "בנגי", ce: "Bangui"}, {n: "לסוטו", ne: "Lesotho", c: "מסרו", ce: "Maseru"}, {n: "מלאווי", ne: "Malawi", c: "לילונגווה", ce: "Lilongwe"}, {n: "סאו טומה ופרינסיפה", ne: "Sao Tome and Principe", c: "סאו טומה", ce: "Sao Tome"}, {n: "סווזילנד (אסוואטיני)", ne: "Eswatini", c: "מבבנה", ce: "Mbabane"}, {n: "קומורו", ne: "Comoros", c: "מורוני", ce: "Moroni"}, {n: "קונגו", ne: "Republic of Congo", c: "ברזוויל", ce: "Brazzaville"}, {n: "כף ורדה", ne: "Cape Verde", c: "פראיה", ce: "Praia"}
            ]},
            "אמריקה": { en: "Americas", sub: {
                "צפון אמריקה": { en: "North America", m: [
                    {n: "ארה\"ב", ne: "USA", c: "וושינגטון", ce: "Washington D.C."}, {n: "קנדה", ne: "Canada", c: "אוטווה", ce: "Ottawa"}, {n: "מקסיקו", ne: "Mexico", c: "מקסיקו סיטי", ce: "Mexico City"}, {n: "גרינלנד", ne: "Greenland", c: "נואוק", ce: "Nuuk"}
                ]},
                "מרכז אמריקה": { en: "Central Am. & Caribbean", m: [
                    {n: "קוסטה ריקה", ne: "Costa Rica", c: "סן חוסה", ce: "San Jose"}, {n: "פנמה", ne: "Panama", c: "פנמה סיטי", ce: "Panama City"}, {n: "גואטמלה", ne: "Guatemala", c: "גואטמלה סיטי", ce: "Guatemala City"}, {n: "ניקרגואה", ne: "Nicaragua", c: "מנגואה", ce: "Managua"}, {n: "הונדורס", ne: "Honduras", c: "טגוסיגלפה", ce: "Tegucigalpa"}, {n: "אל סלוודור", ne: "El Salvador", c: "סן סלוודור", ce: "San Salvador"}, {n: "בליז", ne: "Belize", c: "בלמופאן", ce: "Belmopan"}, {n: "קובה", ne: "Cuba", c: "הוואנה", ce: "Havana"}, {n: "ג'מייקה", ne: "Jamaica", c: "קינגסטון", ce: "Kingston"}, {n: "דומיניקנה", ne: "Dominican Republic", c: "סנטו דומינגו", ce: "Santo Domingo"}, {n: "האיטי", ne: "Haiti", c: "פורט-או-פרנס", ce: "Port-au-Prince"}, {n: "בהאמה", ne: "Bahamas", c: "נסאו", ce: "Nassau"}, {n: "ברבדוס", ne: "Barbados", c: "ברידג'טאון", ce: "Bridgetown"}, {n: "אנטיגואה וברבודה", ne: "Antigua and Barbuda", c: "סנט ג'ונס", ce: "St. John's"}, {n: "גרנדה", ne: "Grenada", c: "סנט ג'ורג'ס", ce: "St. George's"}, {n: "דומיניקה", ne: "Dominica", c: "רוזו", ce: "Roseau"}, {n: "סנט וינסנט", ne: "St. Vincent & Grenadines", c: "קינגסטאון", ce: "Kingstown"}, {n: "סנט לוסיה", ne: "St. Lucia", c: "קסטריז", ce: "Castries"}, {n: "סנט קיטס ונוויס", ne: "St. Kitts and Nevis", c: "באסטר", ce: "Basseterre"}, {n: "טרינידד וטובגו", ne: "Trinidad and Tobago", c: "פורט אוף ספיין", ce: "Port of Spain"}
                ]},
                "דרום אמריקה": { en: "South America", m: [
                    {n: "ברזיל", ne: "Brazil", c: "ברזיליה", ce: "Brasilia"}, {n: "ארגנטינה", ne: "Argentina", c: "בואנוס איירס", ce: "Buenos Aires"}, {n: "צ'ילה", ne: "Chile", c: "סנטיאגו", ce: "Santiago"}, {n: "קולומביה", ne: "Colombia", c: "בוגוטה", ce: "Bogota"}, {n: "פרו", ne: "Peru", c: "לימה", ce: "Lima"}, {n: "אורוגוואי", ne: "Uruguay", c: "מונטווידאו", ce: "Montevideo"}, {n: "פרגוואי", ne: "Paraguay", c: "אסונסיון", ce: "Asuncion"}, {n: "אקוודור", ne: "Ecuador", c: "קיטו", ce: "Quito"}, {n: "בוליביה", ne: "Bolivia", c: "לה פאס", ce: "La Paz"}, {n: "ונצואלה", ne: "Venezuela", c: "קראקס", ce: "Caracas"}, {n: "גיאנה", ne: "Guyana", c: "ג'ורג'טאון", ce: "Georgetown"}, {n: "סורינאם", ne: "Suriname", c: "פרמריבו", ce: "Paramaribo"}
                ]}
            }},
            "אוקיאניה": { en: "Oceania", m: [
                {n: "אוסטרליה", ne: "Australia", c: "קנברה", ce: "Canberra"}, {n: "איי מרשל", ne: "Marshall Islands", c: "מג'ורו", ce: "Majuro"}, {n: "איי שלמה", ne: "Solomon Islands", c: "הוניארה", ce: "Honiara"}, {n: "ונואטו", ne: "Vanuatu", c: "פורט וילה", ce: "Port Vila"}, {n: "טונגה", ne: "Tonga", c: "נוקואלופה", ce: "Nuku'alofa"}, {n: "טובאלו", ne: "Tuvalu", c: "Funafuti", ce: "Funafuti"}, {n: "מיקרונזיה", ne: "Micronesia", c: "פליקיר", ce: "Palikir"}, {n: "נאורו", ne: "Nauru", c: "יארן", ce: "Yaren"}, {n: "ניו זילנד", ne: "New Zealand", c: "ולינגטון", ce: "Wellington"}, {n: "סמואה", ne: "Samoa", c: "אפיה", ce: "Apia"}, {n: "פיג'י", ne: "Fiji", c: "סובה", ce: "Suva"}, {n: "פלאו", ne: "Palau", c: "נגרולמוד", ce: "Ngerulmud"}, {n: "פפואה גינאה החדשה", ne: "Papua New Guinea", c: "פורט מורסבי", ce: "Port Moresby"}, {n: "קיריבטי", ne: "Kiribati", c: "טראווה", ce: "Tarawa"}
            ]}
        };

        let currentActiveList = [], currentQuizAnswer = "", hintCount = 0, currentQuizType = "", stats = { total: 0, success: 0, fail: 0 };
        let timerInterval = null, startTime = null, audioCtx = null;

        function init() {
            updateUI();
            const mainMenu = document.getElementById('main-menu');
            mainMenu.innerHTML = '';
            Object.keys(worldData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "px-4 py-2 rounded-xl font-bold bg-white text-blue-800 border-2 border-blue-100 shadow-sm transition-all hover:bg-blue-50";
                btn.textContent = currentLang === 'he' ? cat : worldData[cat].en;
                btn.id = `main-${cat}`;
                btn.onclick = () => handleMainMenuClick(cat);
                mainMenu.appendChild(btn);
            });
            handleMainMenuClick("אירופה");
        }

        function toggleLanguage() {
            currentLang = currentLang === 'he' ? 'en' : 'he';
            const html = document.getElementById('main-html');
            html.dir = currentLang === 'he' ? 'rtl' : 'ltr';
            html.lang = currentLang;
            document.getElementById('lang-toggle-text').textContent = currentLang === 'he' ? 'English' : 'עברית';
            init();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('header-main').textContent = t.title;
            document.getElementById('header-sub').textContent = t.subtitle;
            document.getElementById('alert-title').textContent = t.shlomiSays;
            document.getElementById('alert-btn-text').textContent = t.ok;
            document.getElementById('quiz-select-title').textContent = t.selectQuiz;
            document.getElementById('btn-quiz-cap').textContent = t.capQuiz;
            document.getElementById('btn-quiz-count').textContent = t.countQuiz;
            document.getElementById('btn-quiz-cancel').textContent = t.cancel;
            document.getElementById('stat-total').textContent = t.total;
            document.getElementById('stat-success').textContent = t.success;
            document.getElementById('stat-fail').textContent = t.fail;
            document.getElementById('stat-time').textContent = t.time;
            document.getElementById('best-score-text').textContent = t.best;
            document.getElementById('btn-check').textContent = t.check;
            document.getElementById('btn-hint').textContent = t.hint;
            document.getElementById('btn-end').textContent = t.end;
            document.getElementById('btn-reset-score').textContent = t.reset;
            document.getElementById('btn-all-world').textContent = t.allWorld;
            document.getElementById('quiz-input').placeholder = t.placeholder;
            document.getElementById('display-country').textContent = t.selectCountry;
            document.getElementById('text-cap-label').textContent = t.capLabel;
            document.getElementById('btn-start-test').textContent = t.startTest;
            document.getElementById('version-tag').textContent = t.version;
            updateHighScoreDisplay();
        }

        function handleAllWorldClick() {
            document.querySelectorAll('#main-menu-container button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('btn-all-world').classList.add('active-btn');
            document.getElementById('countries-grid').innerHTML = ''; 
            let all = [];
            Object.values(worldData).forEach(cat => {
                if (cat.m) all = all.concat(cat.m);
                if (cat.sub) {
                    Object.values(cat.sub).forEach(subCat => all = all.concat(subCat.m));
                }
            });
            currentActiveList = all;
            displayCountries(currentActiveList, translations[currentLang].allWorld);
        }

        function handleMainMenuClick(name) {
            document.querySelectorAll('#main-menu-container button').forEach(b => b.classList.remove('active-btn'));
            const btn = document.getElementById(`main-${name}`);
            if(btn) btn.classList.add('active-btn');
            const data = worldData[name];
            const subContainer = document.getElementById('sub-menu-container');
            if (data.sub) {
                subContainer.classList.remove('hidden'); subContainer.innerHTML = '';
                Object.keys(data.sub).forEach(subName => {
                    const sBtn = document.createElement('button');
                    sBtn.className = "px-3 py-1 rounded-lg font-bold bg-white border-2 border-blue-100 text-xs transition-all hover:bg-blue-50 mx-1 mb-1";
                    sBtn.textContent = currentLang === 'he' ? subName : data.sub[subName].en;
                    sBtn.onclick = () => {
                        currentActiveList = data.sub[subName].m;
                        displayCountries(currentActiveList, sBtn.textContent);
                    };
                    subContainer.appendChild(sBtn);
                });
                subContainer.firstChild.click();
            } else {
                if(subContainer) subContainer.classList.add('hidden');
                currentActiveList = data.m;
                displayCountries(currentActiveList, currentLang === 'he' ? name : data.en);
            }
        }

        function displayCountries(list, title) {
            document.getElementById('current-title').textContent = title;
            const grid = document.getElementById('countries-grid'); grid.innerHTML = '';
            const sorted = [...list].sort((a,b) => (currentLang === 'he' ? a.n : a.ne).localeCompare(currentLang === 'he' ? b.n : b.ne));
            sorted.forEach(item => {
                const card = document.createElement('div');
                card.className = "country-card p-4 rounded-2xl shadow-sm text-center";
                card.textContent = currentLang === 'he' ? item.n : item.ne;
                card.onclick = () => { showCountry(item); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                grid.appendChild(card);
            });
            document.getElementById('country-count').textContent = `${list.length} ${translations[currentLang].countries}`;
        }

        function showCountry(item) {
            document.getElementById('display-country').textContent = currentLang === 'he' ? item.n : item.ne;
            document.getElementById('display-capital').textContent = currentLang === 'he' ? item.c : item.ce;
        }

        function startSpecificQuiz(t) {
            currentQuizType = t; stats = {total:0, success:0, fail:0}; updateScoreUI();
            closeTypeOverlay(); generateQuestion(); startTimer();
            document.getElementById('quiz-overlay').style.display = 'flex';
        }

        function generateQuestion() {
            const random = currentActiveList[Math.floor(Math.random() * currentActiveList.length)];
            const t = translations[currentLang];
            const countryName = currentLang === 'he' ? random.n : random.ne;
            const capName = currentLang === 'he' ? random.c : random.ce;

            if (currentQuizType === 'capital') {
                document.getElementById('quiz-question').textContent = t.qCap + countryName + "?";
                currentQuizAnswer = capName;
            } else {
                document.getElementById('quiz-question').textContent = capName + t.qCount;
                currentQuizAnswer = countryName;
            }
            hintCount = 0; document.getElementById('quiz-input').value = ""; document.getElementById('quiz-input').focus();
        }

        function giveHint() {
            if (hintCount < currentQuizAnswer.length) {
                hintCount++; 
                document.getElementById('quiz-input').value = currentQuizAnswer.substring(0, hintCount);
            }
        }

        function checkAnswer() {
            const input = document.getElementById('quiz-input').value.trim();
            const t = translations[currentLang];
            if (input.toLowerCase() === currentQuizAnswer.toLowerCase()) {
                stats.total++;
                if (hintCount === currentQuizAnswer.length) {
                    stats.fail++; showCustomAlert(t.hintMsg, () => { updateScoreUI(); generateQuestion(); });
                } else {
                    stats.success++; checkAndSaveHighScore(); playSuccessSound();
                    showCustomAlert(t.correctMsg, () => { updateScoreUI(); generateQuestion(); });
                }
            } else { showCustomAlert(t.wrongMsg); }
        }

        function showCustomAlert(m, f) { document.getElementById('custom-alert-message').textContent = m; document.getElementById('custom-alert-overlay').style.display = 'flex'; window.pendingTask = f; }
        function closeCustomAlert() { document.getElementById('custom-alert-overlay').style.display = 'none'; if(window.pendingTask) { window.pendingTask(); window.pendingTask = null; } }
        function startTimer() { startTime = Date.now(); timerInterval = setInterval(() => { const d = Date.now()-startTime; const m = Math.floor(d/60000).toString().padStart(2,'0'); const s = Math.floor((d%60000)/1000).toString().padStart(2,'0'); document.getElementById('quiz-timer').textContent = `${m}:${s}`; }, 1000); }
        function stopTimer() { if (timerInterval) clearInterval(timerInterval); }
        function openTypeOverlay() { document.getElementById('quiz-type-overlay').style.display = 'flex'; }
        function closeTypeOverlay() { document.getElementById('quiz-type-overlay').style.display = 'none'; }
        function closeQuiz() { stopTimer(); document.getElementById('quiz-overlay').style.display = 'none'; }
        function updateScoreUI() { document.getElementById('count-total').textContent = stats.total; document.getElementById('count-success').textContent = stats.success; document.getElementById('count-fail').textContent = stats.fail; }
        function updateHighScoreDisplay() { document.getElementById('high-score-display').textContent = localStorage.getItem('score_'+currentLang) || 0; }
        function checkAndSaveHighScore() { const s = parseInt(localStorage.getItem('score_'+currentLang) || 0); if(stats.success > s) { localStorage.setItem('score_'+currentLang, stats.success); updateHighScoreDisplay(); } }
        function resetHighScore() { if(confirm(translations[currentLang].confirmReset)) { localStorage.setItem('score_'+currentLang, 0); updateHighScoreDisplay(); } }
        function playSuccessSound() { try { if(!audioCtx) audioCtx = new AudioContext(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(523, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime+0.2); } catch(e) {} }

        window.onload = init;
    </script>
